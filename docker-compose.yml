version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: scandi_db
    # Now the database service pulls its password and name from the backend folder
    env_file:
      - ./backend/.env
    ports:
      - "3306:3306"
    volumes:
      - ./db/tables.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: scandi_backend
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: scandi_frontend
    tty: true
    stdin_open: true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npm install && (npm run dev -- --host 0.0.0.0 &) && tail -f /dev/null"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend